name: Validate Skills

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate skill directories and frontmatter
        run: |
          for skill_dir in rust-code-review rust-sdd rust-security-audit; do
            if [ ! -f "$skill_dir/SKILL.md" ]; then
              echo "Error: Missing SKILL.md in $skill_dir"
              exit 1
            fi
            echo "Validating $skill_dir/SKILL.md..."
            head -n 20 "$skill_dir/SKILL.md" | grep -q "^name:" || { echo "Missing name in $skill_dir/SKILL.md"; exit 1; }
            head -n 20 "$skill_dir/SKILL.md" | grep -q "^description:" || { echo "Missing description in $skill_dir/SKILL.md"; exit 1; }
          done
          echo "All skills validated successfully."
